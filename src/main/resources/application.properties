spring.application.name=StreamingClassRoom

spring.datasource.url=jdbc:postgresql://localhost:5435/${POSTGRES_DB:}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

jwt.secret.key=${JWT_SECRET_KEY}

livekit.api.key=${LIVEKIT_API_KEY}
livekit.api.secret=${LIVEKIT_API_SECRET}
livekit.url=${LIVEKIT_URL}

server.address=0.0.0.0
server.port=8080

app.upload.chat-dir=/opt/streaming-classroom/uploads/chat
app.upload.max-file-size=10485760
app.public-base-url=http://10.42.0.1:8080

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB